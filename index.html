<!DOCTYPE html>

<html lang="ru">

<head>

    <link rel="apple-touch-icon" href="icon.png">

    <link rel="apple-touch-icon-precomposed" href="icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="TerraLens">

    <meta name="application-name" content="TerraLens">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="theme-color" content="#ff4d4d">

    <link rel="shortcut icon" type="image/png" href="icon.png">



    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>TerraLens AI | Gemini Edition</title>

   

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>



    <style>

        :root {

            --primary: #ff4757;  

            --blue: #3742fa;

            --dark: #2f3542;

            --glass: rgba(255, 255, 255, 0.98);

            --shadow: 0 20px 40px rgba(0,0,0,0.12);

        }



        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Nunito', sans-serif; overflow: hidden; background: #f1f2f6; }

        #map { width: 100vw; height: 100vh; z-index: 0; opacity: 0; transition: opacity 1.5s ease; background: #a8edea; }

        .leaflet-routing-container { display: none !important; }



        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

       

        .floating { animation: float 4s ease-in-out infinite; }

        .pulse-text { animation: pulse 1.5s infinite; }



        .window {

            position: fixed; /* Изменено с absolute на fixed */

            opacity: 0; visibility: hidden; transform: translateY(20px) scale(0.95);

            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;

            z-index: 1001;

        }

        .window.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); pointer-events: auto; }



        #welcome-screen {

            position: fixed; inset: 0; background: radial-gradient(circle at center, #ffffff 0%, #dfe4ea 100%);

            z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.8s;

        }

        .welcome-card { text-align: center; background: white; padding: 50px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); max-width: 450px; }



        button { border: none; outline: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }

        button:hover { transform: scale(1.06); filter: brightness(1.05); }

        button:active { transform: scale(0.96); }



        .menu-btn {  

            background: var(--glass); padding: 14px 22px; border-radius: 20px; font-weight: 800; color: var(--dark);

            display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.5);

        }

        .menu-btn.active { background: var(--blue); color: white; box-shadow: 0 10px 20px rgba(55, 66, 250, 0.3); }



        .search-wrapper {

            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);

            z-index: 1000; display: flex; background: var(--glass); padding: 8px; border-radius: 50px; box-shadow: var(--shadow);

        }

        .search-input { border: none; background: transparent; padding: 0 20px; width: 300px; font-weight: 700; font-size: 16px; outline: none; }



        .side-menu-btns { position: fixed; top: 100px; left: 25px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }

        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; box-shadow: var(--shadow); border: 1px solid white; }



        #info-card { top: 25px; right: 25px; width: 340px; padding: 30px; }

        #chat-wrapper { bottom: 25px; left: 25px; width: 360px; }



        .bot-head {

            width: 80px; height: 70px; background: var(--primary); border-radius: 24px;

            border: 4px solid #fff; position: relative; display: flex; justify-content: center; align-items: center;

        }

        .bot-face { width: 55px; height: 35px; background: #2f3542; border-radius: 12px; display: flex; justify-content: center; align-items: center; gap: 8px; position: relative; overflow: hidden; }

        .bot-eye { width: 8px; height: 12px; background: #7bed9f; border-radius: 4px; box-shadow: 0 0 10px #7bed9f; animation: blink 4s infinite; }

       

        #chat-log { height: 300px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(241, 242, 246, 0.4); }

        .bubble { padding: 14px 18px; border-radius: 20px; font-size: 14px; font-weight: 700; max-width: 85%; line-height: 1.5; }

        .ai-msg { background: white; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

        .user-msg { background: var(--blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        .typing::after { content: '|'; animation: blink 0.8s infinite; }



        #rating-widget {

            position: fixed; bottom: 25px; right: 25px; z-index: 1000;

            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;

        }



        #menu-toggle-btn {

            position: fixed; top: 25px; left: 25px;

            background: #fff; border: 2px solid #eee; padding: 12px 18px;

            border-radius: 20px; cursor: pointer; font-weight: 800; font-size: 14px;

            color: var(--dark); z-index: 1500; box-shadow: 0 4px 15px rgba(0,0,0,0.05);

            transition: 0.2s; display: flex; align-items: center; gap: 8px;

        }



        .main-side-menu {

            position: fixed; top: 0; left: -320px; width: 280px; height: 100vh;

            background: #ffffff; box-shadow: 5px 0 30px rgba(0,0,0,0.15);

            z-index: 2000; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);

            padding: 25px; display: flex; flex-direction: column;

        }

        .main-side-menu.open { left: 0; }



        /* --- МОБИЛЬНАЯ АДАПТАЦИЯ (ИСПРАВЛЕННАЯ) --- */

        @media (max-width: 768px) {

            .search-wrapper { top: 80px; width: 90%; max-width: 350px; }

            .search-input { width: 100%; font-size: 14px; padding: 0 10px; }



            .side-menu-btns {

                top: auto; bottom: 20px; left: 50%;

                transform: translateX(-50%); flex-direction: row;

                width: 95%; justify-content: center; gap: 8px;

            }

            .menu-btn { padding: 10px 12px; font-size: 11px; }



            #info-card {

                top: 140px; right: auto; left: 50%;

                transform: translateX(-50%) translateY(20px) scale(0.95);

                width: 92%; max-height: 60vh; overflow-y: auto;

            }

            #info-card.active { transform: translateX(-50%) translateY(0) scale(1); }



            #chat-wrapper {

                bottom: 85px; left: 50%;

                transform: translateX(-50%) translateY(20px) scale(0.95);

                width: 92%;

            }

            #chat-wrapper.active { transform: translateX(-50%) translateY(0) scale(1); }



            #rating-widget { bottom: 85px; right: 10px; transform: scale(0.75); }

        }

    </style>

</head>

<body>



 <div id="welcome-screen">

     <div class="welcome-card floating">

         <div class="bot-head" style="width:110px; height:95px; margin: 0 auto 30px; border-radius: 30px;">

             <div class="bot-face" style="width:75px; height:50px;"><div class="bot-eye"></div><div class="bot-eye"></div></div>

         </div>

         <h1 style="font-weight:900; font-size: 38px; color: var(--dark); margin: 0;">TerraLens AI</h1>

         <p style="color: #747d8c; font-weight: 600; font-size: 16px; line-height: 1.6; margin: 20px 0 35px;">

             Привет! Я TerraLens. Со мной ты найдешь гору информации с помощью передового ИИ.

         </p>

         <button onclick="startApp()" style="background: var(--primary); color: white; padding: 18px 45px; border-radius: 50px; font-weight: 900; font-size: 18px;">

             НАЧАТЬ ПУТЕШЕСТВИЕ

         </button>

     </div>

 </div>



 <div id="map"></div>



 <button id="menu-toggle-btn" class="ui-element" style="opacity:0;" onclick="openMenu()">☰ МЕНЮ</button>



 <div id="rating-widget" style="opacity:0; transition: 1s;">

     <div class="rating-bubble" id="rat-text" style="background: white; padding: 15px 20px; border-radius: 25px; box-shadow: var(--shadow); max-width: 220px; font-size: 13px; font-weight: 800; color: var(--dark); position: relative; margin-bottom: 5px;">

         Оцените наш сайт!

         <div class="vote-btns" id="vote-controls" style="display: flex; gap: 15px; margin-top: 10px; justify-content: center;">

             <span onclick="addVote('like')" style="cursor:pointer; font-size:24px;">👍</span>

             <span onclick="addVote('dislike')" style="cursor:pointer; font-size:24px;">👎</span>

         </div>

     </div>

     <div class="bot-head floating" id="rat-bot">

          <div class="bot-face">

             <div class="bot-eye"></div><div class="bot-eye"></div>

         </div>

     </div>

 </div>



 <div class="ui-element search-wrapper" id="ui-search" style="opacity:0;">

     <input type="text" class="search-input" id="global-search" placeholder="Куда отправимся?">

     <button onclick="globalSearch()" style="background: var(--primary); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 900;">ПОИСК</button>

 </div>



 <div class="ui-element side-menu-btns" id="ui-menu" style="opacity:0;">

     <button class="menu-btn active" id="btn-map" onclick="setMode('map')">🗺️ КАРТА</button>

     <button class="menu-btn" id="btn-sat" onclick="setMode('sat')">🛰️ СПУТНИК</button>

     <button class="menu-btn" id="btn-route" onclick="toggleRoutePanel()">🚩 МАРШРУТЫ</button>

     <div id="route-panel" class="glass-panel" style="display:none; flex-direction:column; gap:10px; padding:20px; margin-top:10px;">

         <input type="text" id="start-inp" placeholder="Точка А" style="padding:12px; border-radius:15px; border:1px solid #eee;">

         <input type="text" id="end-inp" placeholder="Точка Б" style="padding:12px; border-radius:15px; border:1px solid #eee;">

         <div style="display:flex; gap:10px;">

             <button onclick="buildRoute()" style="flex:1; background:var(--blue); color:white; padding:12px; border-radius:15px; font-weight:900;">ПУТЬ</button>

             <button onclick="clearRoute()" class="menu-btn" style="padding:12px;">✖</button>

         </div>

     </div>

     <button class="menu-btn" style="background:var(--primary); color:white;" onclick="toggleChat()">🤖 AI TERRABOT</button>

 </div>



 <div id="info-card" class="glass-panel window floating">

     <div id="info-content">

         <div style="display:flex; align-items:center; gap:20px;">

             <img id="card-flag" src="" style="width:60px; border-radius:10px; display:none;">

             <div>

                 <h2 id="card-city" style="margin:0; font-size:26px; font-weight:900;">--</h2>

                 <div id="card-country" style="opacity:0.6; font-weight:800;">--</div>

             </div>

         </div>

         <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin:20px 0;">

             <div><div style="font-size:11px; font-weight:800; color:#a4b0be;">ТЕМПЕРАТУРА</div><div id="card-temp" style="font-size:18px; font-weight:900; color:var(--primary);">--</div></div>

             <div style="text-align:right;"><div style="font-size:11px; font-weight:800; color:#a4b0be;">ВРЕМЯ</div><div id="card-time" style="font-size:18px; font-weight:900;">--</div></div>

         </div>

         <div id="card-wiki" style="font-size:14px; color:#57606f; line-height:1.6; max-height:150px; overflow-y:auto; padding:15px; background:rgba(0,0,0,0.03); border-radius:20px;"></div>

     </div>

     <button onclick="closeWindow('info-card')" style="width:100%; margin-top:25px; padding:15px; border-radius:20px; background:#dfe4ea; font-weight:800; color:var(--dark);">ЗАКРЫТЬ</button>

 </div>



 <div id="chat-wrapper" class="window">

     <div class="bot-head floating" style="margin-bottom: -15px; margin-left: 30px; z-index:10;">

         <div class="bot-face"><div class="bot-eye"></div><div class="bot-eye"></div></div>

     </div>

     <div class="glass-panel" style="overflow:hidden; display:flex; flex-direction:column;">

         <div id="chat-log"></div>

         <div id="loader" class="pulse-text" style="display: none; color: var(--primary); padding: 5px 20px; font-size: 13px; font-weight: 800; text-align: center; background: white;">⚡ Думаю...</div>

         <div style="padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #f1f2f6;">

             <input type="text" id="chat-input" placeholder="Спроси ИИ..." style="flex:1; border:none; outline:none; font-weight:700;">

             <button onclick="sendChat()" style="background:var(--primary); color:white; width:45px; height:45px; border-radius:50%;">➤</button>

         </div>

     </div>

 </div>



 <div id="main-menu" class="main-side-menu">

     <button class="close-menu-btn" onclick="closeMenu()">✖</button>

     <div class="menu-title">TerraLens</div>

     <div class="menu-links">

         <button onclick="openModal('modal-donate')">💖 Поддержка</button>

         <button onclick="openModal('modal-settings')">⚙️ Настройки</button>

     </div>

 </div>



 <div id="modal-overlay" class="modal-overlay" onclick="closeAllModals()"></div>

 <div id="modal-donate" class="custom-modal"><h3>Поддержка</h3><p>Спасибо, что вы с нами!</p><button class="btn-skip" onclick="closeAllModals()">Закрыть</button></div>

 <div id="modal-settings" class="custom-modal">

     <h3>Вид</h3>

     <button class="btn-setting" onclick="setView('mobile')">Мобильная версия</button>

     <button class="btn-setting" onclick="setView('desktop')" style="margin-top:10px;">ПК версия</button>

 </div>



 <script>

     // Конфиг Firebase (твой рабочий)

     const firebaseConfig = {

         apiKey: "AIzaSyAYSeXH7-5Y6iEVO0uPWiVeeICyImayWn4",

         authDomain: "terralens-votes.firebaseapp.com",

         databaseURL: "https://terralens-votes-default-rtdb.europe-west1.firebasedatabase.app",

         projectId: "terralens-votes",

         storageBucket: "terralens-votes.firebasestorage.app",

         messagingSenderId: "306757191202",

         appId: "1:306757191202:web:d9c18b023254b235bfec7b"

     };

     firebase.initializeApp(firebaseConfig);

     const db = firebase.database();



     let map, tileLayer, routingControl;



     function startApp() {

         document.getElementById('welcome-screen').style.opacity = '0';

         setTimeout(() => {

             document.getElementById('welcome-screen').style.display = 'none';

             document.getElementById('map').style.opacity = '1';

             document.getElementById('ui-search').style.opacity = '1';

             document.getElementById('ui-menu').style.opacity = '1';

             document.getElementById('rating-widget').style.opacity = '1';

             document.getElementById('menu-toggle-btn').style.opacity = '1';

             initMap();

         }, 800);

     }



     function initMap() {

         map = L.map('map', { center: [20, 0], zoom: 3, zoomControl: false, attributionControl: false });

         tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

         map.on('click', e => fetchInfo(e.latlng.lat, e.latlng.lng));

     }



     async function fetchInfo(lat, lon) {

         document.getElementById('info-card').classList.add('active');

         try {

             const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ru`).then(r=>r.json());

             const city = geo.address.city || geo.address.town || geo.address.state || "Место";

             document.getElementById('card-city').innerText = city;

             const wiki = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(city)}`).then(r=>r.json());

             document.getElementById('card-wiki').innerText = wiki.extract || "Информации пока нет.";

         } catch(e) {}

     }



     function closeWindow(id) { document.getElementById(id).classList.remove('active'); }

     function toggleChat() { document.getElementById('chat-wrapper').classList.toggle('active'); }

     function openMenu() { document.getElementById('main-menu').classList.add('open'); }

     function closeMenu() { document.getElementById('main-menu').classList.remove('open'); }

     function openModal(id) { closeMenu(); document.getElementById('modal-overlay').style.display = 'block'; document.getElementById(id).style.display = 'block'; setTimeout(() => { document.getElementById('modal-overlay').classList.add('show'); document.getElementById(id).classList.add('show'); }, 10); }

     function closeAllModals() { document.querySelectorAll('.custom-modal, .modal-overlay').forEach(el => el.classList.remove('show')); setTimeout(() => { document.querySelectorAll('.custom-modal, .modal-overlay').forEach(el => el.style.display = 'none'); }, 300); }

     

     async function globalSearch() {

         const q = document.getElementById('global-search').value;

         if(!q) return;

         const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1`).then(res => res.json());

         if(r[0]) { map.flyTo([r[0].lat, r[0].lon], 10); fetchInfo(r[0].lat, r[0].lon); }

     }

 </script>

</body>

</html>
