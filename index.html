<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>TerraLens AI | Gemini Edition</title>



    <link rel="apple-touch-icon" href="icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="theme-color" content="#ff4d4d">

    <link rel="shortcut icon" type="image/png" href="icon.png">



    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>



    <style>

        :root {

            --primary: #ff4757;  

            --blue: #3742fa;

            --dark: #2f3542;

            --glass: rgba(255, 255, 255, 0.75);

            --glass-border: rgba(255, 255, 255, 0.4);

            --shadow: 0 15px 35px rgba(0,0,0,0.1);

            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);

        }



        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Nunito', sans-serif; overflow: hidden; background: #0f172a; }

        

        #map { 

            width: 100vw; 

            height: 100vh; 

            z-index: 0; 

            opacity: 0; 

            filter: grayscale(0.2) contrast(1.1);

            transition: opacity 2s ease, filter 2s ease; 

        }



        /* --- UI ЭЛЕМЕНТЫ: ОБЩИЕ ПРАВИЛА --- */

        .ui-element {

            opacity: 0;

            transform: translateY(20px);

            transition: var(--transition);

        }

        .ui-element.visible {

            opacity: 1;

            transform: translateY(0);

        }



        /* --- GLASSMORPHISM STYLE --- */

        .glass-panel {

            background: var(--glass);

            backdrop-filter: blur(15px) saturate(180%);

            -webkit-backdrop-filter: blur(15px) saturate(180%);

            border: 1px solid var(--glass-border);

            border-radius: 24px;

            box-shadow: var(--shadow);

        }



        /* --- КНОПКИ: СТИЛЬ И АНИМАЦИЯ --- */

        button { 

            border: none; 

            outline: none; 

            cursor: pointer; 

            transition: var(--transition);

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 8px;

        }

        button:hover { 

            transform: translateY(-3px) scale(1.02); 

            filter: brightness(1.1);

            box-shadow: 0 10px 20px rgba(0,0,0,0.1);

        }

        button:active { transform: translateY(0) scale(0.96); }



        .menu-btn {  

            background: white; 

            padding: 12px 20px; 

            border-radius: 18px; 

            font-weight: 800; 

            color: var(--dark);

            box-shadow: 0 4px 10px rgba(0,0,0,0.05);

        }

        .menu-btn.active { 

            background: var(--blue); 

            color: white; 

            box-shadow: 0 8px 15px rgba(55, 66, 250, 0.3); 

        }



        /* --- ПОИСК --- */

        .search-wrapper {

            position: absolute; top: 25px; left: 50%; transform: translateX(-50%) translateY(20px);

            z-index: 1000; display: flex; padding: 8px; border-radius: 50px; width: 400px;

        }

        .search-input { 

            border: none; background: transparent; padding: 0 20px; flex: 1; 

            font-weight: 700; font-size: 16px; outline: none; color: var(--dark);

        }



        /* --- БОКОВОЕ МЕНЮ И ОКНА --- */

        .side-menu-btns { position: absolute; top: 90px; left: 25px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }

        

        .window {

            opacity: 0; visibility: hidden; transform: scale(0.9) translateY(30px);

            transition: var(--transition); pointer-events: none;

        }

        .window.active { opacity: 1; visibility: visible; transform: scale(1) translateY(0); pointer-events: auto; }



        #info-card { position: absolute; top: 25px; right: 25px; width: 340px; z-index: 1001; padding: 25px; }

        #chat-wrapper { position: absolute; bottom: 25px; left: 25px; width: 360px; z-index: 1001; }



        /* --- BOT VISUALS --- */

        .bot-head {

            width: 70px; height: 60px; background: var(--primary); border-radius: 20px;

            border: 3px solid #fff; position: relative; display: flex; justify-content: center; align-items: center;

            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.3);

        }

        .bot-face { width: 45px; height: 30px; background: #2f3542; border-radius: 10px; display: flex; justify-content: center; align-items: center; gap: 6px; }

        .bot-eye { width: 7px; height: 10px; background: #7bed9f; border-radius: 3px; box-shadow: 0 0 8px #7bed9f; animation: blink 4s infinite; }



        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .floating { animation: float 4s ease-in-out infinite; }



        /* --- CHAT LOG --- */

        #chat-log { height: 300px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(255,255,255,0.3); }

        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; font-weight: 700; max-width: 80%; line-height: 1.4; animation: popIn 0.3s ease-out forwards; }

        .ai-msg { background: white; align-self: flex-start; color: var(--dark); border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

        .user-msg { background: var(--blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        @keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }



        /* --- ЭКРАН ПРИВЕТСТВИЯ --- */

        #welcome-screen {

            position: fixed; inset: 0; background: #0f172a; z-index: 9999;

            display: flex; align-items: center; justify-content: center; transition: 1s ease-in-out;

        }

        .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; z-index: 1; animation: floatBlob 15s infinite alternate; }

        .blob-blue { top: -10%; left: -10%; width: 600px; height: 600px; background: var(--blue); }

        .blob-red { bottom: -10%; right: -10%; width: 500px; height: 500px; background: var(--primary); animation-delay: -5s; }

        @keyframes floatBlob { from { transform: translate(0,0); } to { transform: translate(100px, 50px); } }



        .glass-hero-card {

            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(30px);

            border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 40px; text-align: center;

            max-width: 500px; color: white; box-shadow: 0 40px 100px rgba(0,0,0,0.5);

        }



        /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */

        @media (max-width: 768px) {

            .search-wrapper { width: 90%; top: 80px; }

            .side-menu-btns { top: auto; bottom: 20px; left: 50%; transform: translateX(-50%); flex-direction: row; width: 95%; justify-content: center; }

            #info-card { top: 140px; right: 5%; width: 90%; }

            #chat-wrapper { bottom: 90px; left: 5%; width: 90%; }

        }

    </style>

</head>

<body>



<div id="welcome-screen">

    <div class="bg-blob blob-blue"></div>

    <div class="bg-blob blob-red"></div>

    <div class="glass-hero-card" id="hero-card">

        <div class="bot-head floating" style="margin: 0 auto 30px;">

            <div class="bot-face"><div class="bot-eye"></div><div class="bot-eye"></div></div>

        </div>

        <h1 style="font-size: 38px; font-weight: 900; margin-bottom: 15px;">TerraLens AI</h1>

        <p style="font-size: 18px; opacity: 0.8; margin-bottom: 35px; font-weight: 600;">Ваш персональный ИИ-проводник по планете Земля.</p>

        <button class="menu-btn" onclick="startApp()" style="margin: 0 auto; padding: 18px 40px; font-size: 18px; background: white; color: black; width: 100%;">

            Начать исследование ✨

        </button>

    </div>

</div>



<div id="map"></div>



<button id="menu-toggle-btn" class="ui-element menu-btn" style="position: absolute; top: 25px; left: 25px; z-index: 1500;" onclick="openMenu()">☰ МЕНЮ</button>



<div class="ui-element glass-panel search-wrapper" id="ui-search">

    <input type="text" class="search-input" id="global-search" placeholder="Поиск локации...">

    <button onclick="globalSearch()" style="background: var(--primary); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 900;">НАЙТИ</button>

</div>



<div class="ui-element side-menu-btns" id="ui-btns">

    <button class="menu-btn active" id="btn-map" onclick="setMode('map')">🗺️ Карта</button>

    <button class="menu-btn" id="btn-sat" onclick="setMode('sat')">🛰️ Спутник</button>

    <button class="menu-btn" onclick="toggleChat()" style="background: var(--primary); color: white;">🤖 TerraBot</button>

</div>



<div id="info-card" class="glass-panel window">

    <div id="info-content">

        <div style="display:flex; align-items:center; gap:15px; margin-bottom: 20px;">

            <img id="card-flag" src="" style="width:50px; border-radius:8px; display:none; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">

            <div>

                <h2 id="card-city" style="margin:0; font-size:24px; font-weight:900;">--</h2>

                <div id="card-country" style="opacity:0.6; font-weight:700;">--</div>

            </div>

        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">

            <div class="glass-panel" style="padding: 12px; background: rgba(255,255,255,0.5);">

                <small style="font-weight:800; color:var(--primary);">ТЕМП.</small>

                <div id="card-temp" style="font-size:18px; font-weight:900;">--</div>

            </div>

            <div class="glass-panel" style="padding: 12px; background: rgba(255,255,255,0.5);">

                <small style="font-weight:800; color:var(--blue);">ВРЕМЯ</small>

                <div id="card-time" style="font-size:18px; font-weight:900;">--</div>

            </div>

        </div>

        <p id="card-wiki" style="margin-top:20px; font-size:14px; color:#444; line-height:1.5; max-height:120px; overflow-y:auto;"></p>

    </div>

    <button onclick="closeWindow('info-card')" style="width:100%; margin-top:20px; padding:12px; border-radius:15px; background: rgba(0,0,0,0.05); font-weight:800;">ЗАКРЫТЬ</button>

</div>



<div id="chat-wrapper" class="window">

    <div class="bot-head floating" style="margin-bottom: -15px; margin-left: 25px; z-index:10; transform: scale(0.9);">

        <div class="bot-face"><div class="bot-eye"></div><div class="bot-eye"></div></div>

    </div>

    <div class="glass-panel" style="overflow:hidden;">

        <div style="padding:35px 20px 15px; text-align:center; font-weight:900; color:var(--primary); background:rgba(255,255,255,0.5);">TerraBot Gemini</div>

        <div id="chat-log"></div>

        <div style="padding:15px; background:white; display:flex; gap:10px;">

            <input type="text" id="chat-input" placeholder="Спроси меня о месте..." style="flex:1; border:none; outline:none; font-weight:700;">

            <button onclick="sendChat()" style="background:var(--primary); color:white; width:40px; height:40px; border-radius:50%;">➤</button>

        </div>

    </div>

</div>



<script>

    // Config & Init

    const firebaseConfig = {

        apiKey: "AIzaSyAYSeXH7-5Y6iEVO0uPWiVeeICyImayWn4",

        databaseURL: "https://terralens-votes-default-rtdb.europe-west1.firebasedatabase.app",

        projectId: "terralens-votes"

    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();



    let map, tileLayer;



    function startApp() {

        const welcome = document.getElementById('welcome-screen');

        welcome.style.opacity = '0';

        welcome.style.transform = 'scale(1.1)';

        

        setTimeout(() => {

            welcome.style.display = 'none';

            document.getElementById('map').style.opacity = '1';

            

            // Плавное поочередное появление элементов

            const elements = document.querySelectorAll('.ui-element');

            elements.forEach((el, i) => {

                setTimeout(() => el.classList.add('visible'), i * 200 + 500);

            });



            initMap();

        }, 1000);

    }



    function initMap() {

        map = L.map('map', { center: [20, 0], zoom: 3, zoomControl: false, attributionControl: false });

        tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        map.on('click', e => fetchInfo(e.latlng.lat, e.latlng.lng));

    }



    async function fetchInfo(lat, lon) {

        const card = document.getElementById('info-card');

        card.classList.add('active');

        try {

            const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ru`).then(r=>r.json());

            const city = geo.address.city || geo.address.town || geo.address.village || "Точка на карте";

            

            document.getElementById('card-city').innerText = city;

            document.getElementById('card-country').innerText = geo.address.country || "";

            

            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`).then(r=>r.json());

            document.getElementById('card-temp').innerText = Math.round(w.current_weather.temperature) + "°C";

            

            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            document.getElementById('card-time').innerText = time;



            const wiki = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(city)}`).then(r=>r.json());

            document.getElementById('card-wiki').innerText = wiki.extract || "Информация не найдена.";

            

            if(geo.address.country_code) {

                const flag = document.getElementById('card-flag');

                flag.src = `https://flagsapi.com/${geo.address.country_code.toUpperCase()}/flat/64.png`;

                flag.style.display = 'block';

            }

        } catch(e) { console.error(e); }

    }



    async function globalSearch() {

        const q = document.getElementById('global-search').value;

        if(!q) return;

        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1`).then(r=>r.json());

        if(res[0]) {

            map.flyTo([res[0].lat, res[0].lon], 10);

            fetchInfo(res[0].lat, res[0].lon);

        }

    }



    function setMode(m) {

        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));

        document.getElementById(m === 'sat' ? 'btn-sat' : 'btn-map').classList.add('active');

        tileLayer.setUrl(m === 'sat' ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    }



    function toggleChat() { document.getElementById('chat-wrapper').classList.toggle('active'); }

    function closeWindow(id) { document.getElementById(id).classList.remove('active'); }



    // 3D Parallax эффект для карточки приветствия

    const hero = document.getElementById('hero-card');

    document.addEventListener('mousemove', (e) => {

        if(document.getElementById('welcome-screen').style.display === 'none') return;

        let x = (window.innerWidth / 2 - e.pageX) / 30;

        let y = (window.innerHeight / 2 - e.pageY) / 30;

        hero.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;

    });

</script>



</body>

</html>
