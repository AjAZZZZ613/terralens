<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>TerraLens AI - Gemini Edition</title>



    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>



    <style>

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; background: #000; }

        #map { height: 100%; width: 100%; position: absolute; z-index: 1; }



        /* Меню */

        .side-menu-btns { position: absolute; top: 50px; left: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }

        .menu-btn { padding: 14px 20px; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s; }

        .btn-camera { background: #ff4757; color: white; border: 2px solid white; }

        

        /* Чат */

        #chat-wrapper { position: absolute; bottom: 30px; left: 20px; right: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); max-height: 300px; border-radius: 20px; z-index: 1000; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        #chat-wrapper.active { display: flex; }

        #chat-messages { padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

        .bot-msg { background: #f1f2f6; padding: 10px 14px; border-radius: 15px; align-self: flex-start; color: #2f3542; font-size: 14px; }



        /* КАМЕРА (ФИКС) */

        #camera-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }

        #camera-wrapper.active { display: block; }

        #camera-feed { width: 100%; height: 100%; object-fit: cover; }

        

        /* КНОПКА ФОТО - ТЕПЕРЬ ТОЧНО НАЖМЕТСЯ */

        #capture-container { position: absolute; bottom: 60px; width: 100%; display: flex; justify-content: center; z-index: 6000; }

        #camera-capture-btn { width: 80px; height: 80px; background: white; border: 6px solid #ff4757; border-radius: 50%; cursor: pointer; }

        

        #camera-close-btn { position: absolute; top: 40px; right: 20px; background: rgba(0,0,0,0.5); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 24px; z-index: 6000; }

        

        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 7000; }

    </style>

</head>

<body>



    <div id="map"></div>



    <div class="side-menu-btns">

        <button class="menu-btn btn-camera" onclick="openCamera()">📷 СКАНИРОВАТЬ</button>

    </div>



    <div id="chat-wrapper">

        <div id="chat-messages">

            <div class="bot-msg">Я готов! Наведи камеру на что-то интересное.</div>

        </div>

    </div>



    <div id="camera-wrapper">

        <button id="camera-close-btn" onclick="closeCamera()">×</button>

        <video id="camera-feed" autoplay playsinline></video>

        

        <div id="capture-container">

            <button id="camera-capture-btn" onclick="captureAndRecognize()"></button>

        </div>



        <div id="loading-overlay">

            <div style="font-size: 40px; margin-bottom: 10px;">🤖</div>

            <div>ТерраБот думает...</div>

        </div>

        

        <canvas id="camera-canvas" style="display:none;"></canvas>

    </div>



    <script>

        // ТВОЙ КЛЮЧ (ВСТАВЬ ЕГО СЮДА)

        const API_KEY = "sk-or-v1-...."; 



        var map = L.map('map', { zoomControl: false }).setView([20, 0], 2);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);



        var stream;



        function addMessage(text) {

            const container = document.getElementById('chat-messages');

            const msg = document.createElement('div');

            msg.className = 'bot-msg';

            msg.innerHTML = text;

            container.appendChild(msg);

            container.scrollTop = container.scrollHeight;

        }



        async function openCamera() {

            try {

                stream = await navigator.mediaDevices.getUserMedia({ 

                    video: { facingMode: 'environment' } 

                });

                document.getElementById('camera-feed').srcObject = stream;

                document.getElementById('camera-wrapper').classList.add('active');

            } catch (err) {

                alert("Нужен доступ к камере!");

            }

        }



        function closeCamera() {

            document.getElementById('camera-wrapper').classList.remove('active');

            if (stream) stream.getTracks().forEach(t => t.stop());

        }



        async function captureAndRecognize() {

            const video = document.getElementById('camera-feed');

            const canvas = document.getElementById('camera-canvas');

            const overlay = document.getElementById('loading-overlay');

            

            // 1. Снимок

            canvas.width = 640;

            canvas.height = (video.videoHeight / video.videoWidth) * 640;

            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

            const base64Image = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];



            overlay.style.display = 'flex';



            try {

                // 2. Реальный запрос к Llama Vision

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {

                    method: "POST",

                    headers: {

                        "Authorization": `Bearer ${API_KEY}`,

                        "Content-Type": "application/json"

                    },

                    body: JSON.stringify({

                        "model": "meta-llama/llama-3.2-11b-vision-instruct",

                        "messages": [{

                            "role": "user",

                            "content": [

                                { "type": "text", "text": "Назови только название этого места и город. Очень кратко, на русском." },

                                { "type": "image_url", "image_url": { "url": `data:image/jpeg;base64,${base64Image}` } }

                            ]

                        }]

                    })

                });



                const data = await response.json();

                const place = data.choices[0].message.content.trim();



                // 3. Поиск координат через Nominatim (бесплатно)

                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`);

                const geoData = await geoRes.json();



                closeCamera();

                overlay.style.display = 'none';

                document.getElementById('chat-wrapper').classList.add('active');

                addMessage(`📷 <b>Вижу:</b> ${place}`);



                if (geoData && geoData.length > 0) {

                    const lat = geoData[0].lat;

                    const lon = geoData[0].lon;

                    map.flyTo([lat, lon], 15);

                    L.marker([lat, lon]).addTo(map).bindPopup(place).openPopup();

                } else {

                    addMessage("📍 Не смог найти точные координаты на карте, но место узнал!");

                }



            } catch (err) {

                console.error(err);

                alert("Ошибка ИИ. Проверь интернет или API ключ.");

                overlay.style.display = 'none';

            }

        }

    </script>

</body>

</html>
